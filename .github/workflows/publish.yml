name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  # ── 1. Build binary wheels on all three platforms ─────────────────────────
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for Linux aarch64 cross-build)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      - name: Generate snkv.h (Linux and macOS)
        if: runner.os != 'Windows'
        run: make snkv.h && cp snkv.h python/

      - name: Pre-cache virtualenv.pyz (Linux and macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          else
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          curl -fsSL "https://raw.githubusercontent.com/pypa/get-virtualenv/20.27.1/public/virtualenv.pyz" \
            -o "$CACHE_DIR/virtualenv-20.27.1.pyz"

      - name: Pre-cache virtualenv.pyz (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = "$env:LOCALAPPDATA\pypa\cibuildwheel\Cache\virtualenv-20.27.1.pyz"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Invoke-WebRequest "https://raw.githubusercontent.com/pypa/get-virtualenv/20.27.1/public/virtualenv.pyz" -OutFile $dest

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: python/
          output-dir: wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── 2. Build source distribution (sdist) ──────────────────────────────────
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential python3-dev python3-pip
          python3 -m pip install build

      - name: Build sdist
        run: cd python && python3 -m build --sdist --outdir ../dist/

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── 3. Publish everything to PyPI ─────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publisher

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
